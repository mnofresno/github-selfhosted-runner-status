services:
  runner-dind:
    image: ${DIND_IMAGE:-docker:27-dind}
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ''
    command:
      - dockerd
      - --host=tcp://127.0.0.1:2375
      - --host=unix:///var/run/docker.sock
      - --ip=127.0.0.1
    volumes:
      - runner-docker:/var/lib/docker

  runner:
    image: ${RUNNER_IMAGE:-myoung34/github-runner:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUNNER_SCOPE: ${RUNNER_SCOPE:-repo}
      DISABLE_AUTO_UPDATE: 'true'
      EPHEMERAL: ${EPHEMERAL:-true}
      DOCKER_HOST: tcp://127.0.0.1:2375
    volumes:
      - runner-work:/tmp/github-runner
    depends_on:
      - runner-dind
    network_mode: service:runner-dind

  runner-status:
    image: node:20-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-github-runner-fleet}
      STATUS_PORT: ${STATUS_INTERNAL_PORT:-8080}
      CLEANUP_COOLDOWN_MS: ${CLEANUP_COOLDOWN_MS:-900000}
      CLEANUP_DANGLING_MAX_AGE: ${CLEANUP_DANGLING_MAX_AGE:-24h}
      CLEANUP_BUILD_CACHE_MAX_AGE: ${CLEANUP_BUILD_CACHE_MAX_AGE:-24h}
    command: ["node", "/app/server.js"]
    ports:
      - "${STATUS_BIND:-127.0.0.1:3571}:${STATUS_INTERNAL_PORT:-8080}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./status-app:/app:ro
      - /tmp/github-runner:/tmp/github-runner

volumes:
  runner-work:
  runner-docker:
