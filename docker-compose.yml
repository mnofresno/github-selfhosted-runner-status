services:
  runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUNNER_SCOPE: repo
      DISABLE_AUTO_UPDATE: 'true'
      EPHEMERAL: 'false'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/mariano-fresno/github-selfhosted/work:/tmp/github-runner-bpf-application

  runner-status:
    image: node:20-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      COMPOSE_PROJECT_NAME: github-selfhosted
    command: ["node", "/app/server.js"]
    ports:
      - "${STATUS_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/mariano-fresno/github-selfhosted/status-app:/app:ro
