# Example GitHub Actions workflow using fleet build cache
# Place this in your project's .github/workflows/ci.yml

name: CI with Fleet Cache

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: [self-hosted, ephemeral]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for commit SHA
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Try to fetch cached build
        id: fetch-cache
        run: |
          # Try to fetch cached build for this commit
          if /cache/scripts/fetch.sh "${{ github.repository }}" "/tmp/cached-build"; then
            echo "cache-hit=true" >> $GITHUB_OUTPUT
            echo "Using cached build from commit $(cat /tmp/cached-build/.cache-metadata.json | jq -r .commit_sha)"
          else
            echo "cache-hit=false" >> $GITHUB_OUTPUT
            echo "No cache found, building fresh"
          fi
        
      - name: Build application
        if: steps.fetch-cache.outputs.cache-hit != 'true'
        run: |
          # Build the application
          npm run build
          
          # Store the build in cache
          /cache/scripts/store.sh "${{ github.repository }}" "./dist"
          
      - name: Use cached build
        if: steps.fetch-cache.outputs.cache-hit == 'true'
        run: |
          # Copy cached build to dist directory
          cp -r /tmp/cached-build/* ./dist/
          
      - name: Run tests
        run: npm test
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1