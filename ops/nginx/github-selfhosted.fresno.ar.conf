server {
    listen 80;
    server_name github-selfhosted.fresno.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name github-selfhosted.fresno.ar;

    include ssl_certs_fresno.conf;

    access_log /var/log/nginx/access.github-selfhosted.fresno.ar.log;
    error_log /var/log/nginx/error.github-selfhosted.fresno.ar.log info;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-github-selfhosted;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cache-Control "no-store" always;

    location / {
        limit_except GET HEAD { deny all; }
        proxy_pass http://127.0.0.1:3571;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
